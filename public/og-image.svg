<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient orb -->
  <circle cx="600" cy="315" r="250" fill="#5b9a8b" opacity="0.06"/>
  <circle cx="600" cy="315" r="150" fill="#5b9a8b" opacity="0.04"/>

  <!-- Logo icon -->
  <rect x="540" y="160" width="120" height="120" rx="24" fill="#5b9a8b" opacity="0.12" stroke="#5b9a8b" stroke-opacity="0.3" stroke-width="2"/>
  <text x="600" y="245" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="64" fill="#5b9a8b">O</text>

  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" fill="#e5e5e5">Obscribe</text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#999999">End-to-end encrypted notebooks</text>

  <!-- Bottom accent line -->
  <rect x="500" y="460" width="200" height="3" rx="1.5" fill="#5b9a8b" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="18" fill="#666666">Open source · Self-hostable · AES-256-GCM</text>
</svg>
